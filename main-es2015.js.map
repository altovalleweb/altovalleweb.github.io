<section>
    <div class="container mt-2">
        <div class="row">
            <div class="col-md-12">
                <div class="card shadow">
                    <div class="card-header text-muted">
                      <h4>Actualizar información de contacto</h4>
                    </div>
                    <div class="card-body">
                        <form [formGroup]="updateForm" (keydown.enter)="$event.preventDefault()" novalidate>
                            <div class="form-group">
                              <label for="exampleInputEmail1">Email</label>
                              <input type="email" class="form-control" formControlName="email" id="emailid" aria-describedby="emailHelp" placeholder="Ingrese su email" [ngClass]="{ 'is-invalid': updateForm.controls['email'].errors }">                              
                              <div *ngIf="updateForm.controls['email'].errors" class="invalid-feedback">
                                <div *ngIf="updateForm.controls['email'].errors.esEmail">Email no válido</div>                        
                                <div *ngIf="!updateForm.controls['email'].errors.required==false">Campo obligatorio</div>
                              </div>
                            </div>
                            <div class="form-group">
                              <label for="exampleInputPassword1">Teléfono fijo</label>
                              <input type="text" class="form-control" id="telFijoid" formControlName="telefonoFijo" placeholder="Ingrese su número teléfonico" maxlength="20" appNumberEnteroOnly>
                              <small id="telFijoidHelp" class="form-text text-muted">Utilice solo números.</small>
                            </div> 
                            <div class="form-group">
                                <label for="exampleInputPassword1">Teléfono celular</label>
                                <input type="text" class="form-control" id="telCelularid" formControlName="telefonoCelular" placeholder="Ingrese su número teléfonico" maxlength="20" appNumberEnteroOnly>
                                <small id="telCelularidHelp" class="form-text text-muted">Utilice solo números.</small>
                              </div> 
                              <div style="    text-align: center">
                                <button  [disabled]="!updateForm.valid" type="submit" class="btn btn-success" (click)="actualizar()">Guardar</button>
                              </div>                          
                            
                          </form>
                    </div>
                  </div>
            </div>
        </div>
    </div>
</section>


<notifier-container></notifier-container>
