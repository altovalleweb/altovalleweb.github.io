
       <section>
      <div class="container mt-4">
          <div class="row">
              <div class="col-md-12">
                  <div class="card shadow">
                      <div class="card-header text-muted">
                        <h4>Pagar facturas</h4>
                      </div>
                      <div class="card-body">
                        <div class="row mt-4">   
                          <div class="col-md-6 mb-2">
                              <app-listado-facturas [mostrarPagas]="mostrarFacturasPagas" (seleccionRetorno)="cambioSeleccionPagoFacturas($event)" (sinFacturasParaAbonar)="sinFacturasParaAbonar($event)"></app-listado-facturas>
                          </div>
                          <div class="col-md-6" *ngIf="!sinFacturasParaPagar">
                              <div class="card shadow" style="border-color:#1595a9; padding: 0px;">
                                  <div class="card-header bg-info text-white"><b>Total a Pagar</b></div>
                                  <div class="card-body" style="padding: 0px;">
                                    <table class="table table-condensed" style="margin: 0px">
                                      <tr>
                                        <td class="text-muted text-center" style="border-right: 1px solid #ddd;">
                                          <h4>${{totalACobrar}}</h4>
                                        </td>
                                        <td width="50%">  
                                          <ng-container *ngIf="!estaProcesando; else procesando">
                                            <button type="button" class="btn btn-success"
                                            style="float: right;" (click)="pagar()"
                                            [attr.disabled]="totalACobrar==0? true : null">Pagar</button>
                                          </ng-container>                       
                                          <ng-template #procesando>
                                            <button type="button" class="btn btn-info"
                                            style="float: right;"
                                            ><span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Generando pago ...</button>
                                          </ng-template>                          
                                        </td>
                                      </tr>                
                                    </table>
                                  </div>
                                </div>
                          </div>
                          
                      </div>
                      </div>
                    </div>
              </div>
          </div>
      </div>
  </section>


    <div class="modal" tabindex="-1" role="dialog"  id="mailRequerido" data-backdrop="static" data-keyboard="false">
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Mail Requerido</h5>       
          </div>
          <div class="modal-body">
            <div class="row">
              <div class="col-md-2"><i class="fa fa-info-circle fa-3x" style="color:cadetblue" aria-hidden="true"></i></div>
              <div class="col-md-10"><p>Necesita actualizar su casilla de correo electrónico para poder continuar con la operación!</p>
                <p>Una vez actualizada la información podrá realizar dicha operación.</p>
              </div>
            </div>
          </div>
          <div class="modal-footer">        
            <button type="button" class="btn btn-danger" (click)="cancelar()">Cancelar</button>
            <button type="button" class="btn btn-info" (click)="actualizarDatos()">Actualizar mis datos</button>
          </div>
        </div>
      </div>
    </div>
