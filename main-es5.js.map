<section>
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-12">
                <div class="card shadow">
                    <div class="card-header text-muted">
                      <h4>Mis facturas <sup *ngIf="mostrarFacturasAdeudadas" style="color:red">(1)</sup></h4>
                    </div>
                    <div class="card-body">
                      <div class="table-responsive">
                        <table class="table table-striped">
                          <tr>
                          
                            <th class="text-center">Periodo</th>
                            <th class="text-center">Vencimiento</th>
                            <th class="text-center">Total</th>
                            <th class="text-center">Estado<sup>*</sup></th>
                            <th class="text-center">Descargar</th>
                          </tr>
                          <tr *ngFor="let factura of facturasResumen$ |async " >                            
                            <td class="text-center">{{factura.periodo}}</td>
                            <td class="text-center">{{factura.fechaVencimiento}}</td>
                            <td class="text-center">{{factura.total}}</td>
                            <td class="text-center">{{factura.estado}}</td>     
                            <td class="text-center"><button type="button" class="btn  btn-sm" [ngClass]="factura.estado=='Pagada'?'btn-success':'btn-danger'"  title="descargar factura" (click)="descargarFactura(factura.factura,factura.periodo)">Descargar</button></td>              
                          </tr> 
                        </table>
                      </div>
                      <label *ngIf="mostrarFacturasAdeudadas">  <small> <span style="color:red">(1)</span> La Cooperativa le informá que al día de la fecha<sup>*</sup> posee factura/s adeudada/s. Las facturas adeudadas corresponden a periodos previos a marzo de 2020. Para mayor información recomendamos contactarse con la Cooperativa en los horarios de 8 a 14:30 hs. </small></label> 
                      <label> <sup>*</sup> <small>última actualización: {{ultimaActualizacion$|async}}</small></label>
                    </div>
                  </div>
            </div>
        </div>
    </div>
</section>
