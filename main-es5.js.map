  <div class="fondo">
    <div class="container pt-5">
      <div class="row mt-5 mb-5">
      <div class="col-md-6 my-auto">
        <img class="img-fluid" src="assets/img/logo_div.png"  alt="">
      </div>
      <div class="col-md-6">
        <div class="card">
          <div class="card-body">
            <h4 class="text-center text-white">Ingreso</h4>
  
            <form [formGroup]="loginForm" (keydown.enter)="$event.preventDefault()" novalidate>
              <div class="form-group">
                <label for="exampleInputUser1">Socio</label>
                <input type="text" class="form-control" formControlName="cliente" maxlength="10" placeholder="Ingrese nro. de socio" [ngClass]="{ 'is-invalid': ( (submitted && (loginForm.controls['cliente'].errors)) || errorLogin   ) }">
                <label class="mt-1"><a class="text-white" href="" data-toggle="modal" data-target="#factura_modal"><i class="fa fa-question-circle" aria-hidden="true"></i> Donde encuentro el número?</a></label>
              </div>
  
               <div *ngIf="errorLogin" class="alert alert-danger" role="alert">
                <i class="fa fa-exclamation-triangle fa-lg" aria-hidden="true"></i> El número ingresado no corresponde a un usuario activo o en servicio
              </div>
  
              <button type="submit" class="btn btn-warning btn-lg btn-block" (click)="ingresar()">
                <span>Ingresar</span>
                &nbsp;
                <span class="spinner-border spinner-border-sm mr-2" role="status" aria-hidden="true" *ngIf="loading$ | async"></span>
              </button>
            </form>
          </div>
          </div>
        </div>
      </div>
    </div>
  
    <div class="container mb-3">
      <div class="row bg-tres">
        <div class="col text-center text-white p-4" style="border-bottom: solid 8px #9b59b6;">
          <i class="fa fa-envelope-o fa-2x pb-2 text-white" aria-hidden="true"></i><br>
          <a class="text-white text-center"
            href="mailto:sociosaguaplottier@gmail.com">sociosaguaplottier@gmail.com</a><br>
            <a class="text-white text-center" href="mailto:aguaplot@gmail.com">aguaplot@gmail.com</a>
        </div>
        <div class="col text-center text-white p-4" style="border-bottom: solid 8px #f39c12; border-left: dashed 1px white;">
          <i class="fa fa-phone fa-2x pb-2" aria-hidden="true"></i><br>299 4933264<br>299 4606616
        </div>
        <div class="col text-center text-white p-4" style="border-bottom: red 8px solid; border-left: dashed 1px white;">
          <i class="fa fa-exclamation-triangle fa-2x pb-2" aria-hidden="true"></i>
          <p class="mb-1" style="font-size: large;">Guardia de emergencia</p>
              <p class="mb-1" style="font-size: large;">299 4606599</p>
              <p class="mb-1" style="font-size: large;">299 4933576</p>
        </div>
      </div>
    </div>
  
  
      <!-- Modal -->
      <div class="modal fade" id="factura_modal" tabindex="-1" role="dialog" aria-labelledby="exampleModalCenterTitle" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="exampleModalLongTitle">Factura ilustrativa. Información no válida.</h5>
              <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                <span aria-hidden="true">&times;</span>
              </button>
            </div>
            <div class="modal-body">
              <img class="img-fluid" src="assets/img/factura_modal.png" alt="">
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-dismiss="modal">Cerrar</button>
            </div>
          </div>
        </div>
      </div>
  </div>
