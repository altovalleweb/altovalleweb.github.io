<section>
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-12">
                <div class="card shadow">
                    <div class="card-header text-muted">
                        <h4>Mis recibos semestrales</h4>
                    </div>
                  
                    <div class="card-body">
                        <div class="table-responsive">
                          <table class="table table-striped">
                            <tr>                  
                              <th class="text-center">Semestre</th>
                              <th class="text-center">Vencimiento</th>
                              <th class="text-center">Total</th>
                              <th class="text-center">Estado <sup>*</sup></th>                    
                              <th class="text-center">Descargar</th>
                            </tr>
                            <tr *ngFor="let recibo of recibosResumen$ |async " >                              
                              <td class="text-center">{{recibo.semestre}}</td>
                              <td class="text-center">{{recibo.fechaVencimiento}}</td>
                              <td class="text-center">{{recibo.total}}</td>
                              <td class="text-center">{{recibo.estado}}</td> 
                              <td class="text-center"><button *ngIf="recibo.habilitar_descarga==1" type="button" class="btn btn-sm" [ngClass]="recibo.estado=='Pagada'?'btn-success':'btn-danger'" title="descargar recibo semestral" (click)="descargarRecibo(recibo.recibo)">Descargar</button></td>                    
                            </tr>                  
                          </table>
                        </div>           
                        <label> <sup>*</sup> <small>última actualización: {{ultimaActualizacion$|async}}</small></label>        
                      </div>
                </div>
            </div>
        </div>
    </div>
</section>
