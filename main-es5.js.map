      
      <ng-container *ngIf="rowData.length>0; else mostrarInfoSinFacturas">
        <ag-grid-angular 
        #grid
        [style]="'height:350px'" 
        class="ag-theme-alpine"
        [rowData]="rowData" 
        [columnDefs]="columnDefs"
        [colResizeDefault]="'fit'"        
        [rowSelection]="'multiple'"
        (selectionChanged)="onSelectionChanged($event)"
        (gridReady)="onGridReady($event)"                      
        >
    </ag-grid-angular>
      </ng-container>
      
      <ng-template #mostrarInfoSinFacturas>
        <div class="alert alert-info" role="alert" style="text-align: center;">
            No posee facturas disponibles para abonar!
          </div>
      </ng-template>
